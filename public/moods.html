<!DOCTYPE html>
<html>

<head>

<title>Moods</title>

<style>

body{

margin:0;
padding:0;

min-height:100vh;

background:
linear-gradient(
135deg,
#000,
#220010,
#580028
);

font-family:Arial;

color:white;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

overflow:hidden;

}

h1{

font-size:70px;

color:#ffb0db;

text-shadow:
0 0 25px hotpink;

margin-bottom:10px;

}

p{

font-size:24px;

color:#ffd5eb;

}

.grid{

display:flex;

gap:30px;

margin-top:80px;

flex-wrap:wrap;

justify-content:center;

}

.card{

width:230px;

padding:35px;

border-radius:35px;

cursor:pointer;

background:
rgba(255,105,180,.08);

box-shadow:
0 0 35px rgba(255,20,147,.3);

transition:.4s;

text-align:center;

}

.card:hover{

transform:
translateY(-10px);

box-shadow:
0 0 45px hotpink;

}

.emoji{

font-size:60px;

margin-bottom:20px;

}

</style>

</head>

<body>

<h1>

pick your mood today

</h1>

<p>

today adapts around you 💗

</p>


<div class="grid">

<div class="card">

<div class="emoji">

😴

</div>

<h2>exhausted</h2>

<p>too tired to exist</p>

</div>


<div class="card">

<div class="emoji">

🥺

</div>

<h2>sad</h2>

<p>everything feels heavy</p>

</div>


<div class="card">

<div class="emoji">

✨

</div>

<h2>happy</h2>

<p>rare sighting detected</p>

</div>


<div class="card">

<div class="emoji">

🚗

</div>

<h2>disappear</h2>

<p>music + drive + vanish</p>

</div>


</div>

</body>

</html>
